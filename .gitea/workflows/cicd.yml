name: Continuous Integration

on:
  push:
    branches: [main, staging, production]
  pull_request:
    branches: [main, staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --no-verify-store-integrity

      - name: Lint
        run: pnpm lint

      - name: Check format
        run: pnpm format:check

      - name: Test build
        run: pnpm build

      - name: Test units
        run: pnpm test

  build-and-push-image:
    name: Build Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v4
        with:
          registry: gitea.entervise.net
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Determine target environment variables
        id: env-vars
        run: |
          # Sanitize the branch name (replace slashes with hyphens and lowercase it)
          CLEAN_TAG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g' | tr '[:upper:]' '[:lower:]')
          echo "clean_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

          # Lowercase the repository name
          LOWERCASE_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lowercase_repo=${LOWERCASE_REPO}" >> $GITHUB_OUTPUT

          # Environment URL logic
          if [ "${{ github.ref_name }}" = "production" ]; then
            echo "socket_url=https://sockets.epplms.paragoniu.app" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "socket_url=https://sockets.epplms-staging.paragoniu.app" >> $GITHUB_OUTPUT
          else
            echo "socket_url=https://sockets.paragonepp.work" >> $GITHUB_OUTPUT
          fi

          # Extract short commit SHA (7 characters)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push standalone image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            gitea.entervise.net/${{ steps.env-vars.outputs.lowercase_repo }}:${{ steps.env-vars.outputs.clean_tag }}-${{ steps.env-vars.outputs.short_sha }}
            gitea.entervise.net/${{ steps.env-vars.outputs.lowercase_repo }}:${{ steps.env-vars.outputs.clean_tag }}
            gitea.entervise.net/${{ steps.env-vars.outputs.lowercase_repo }}:latest
          build-args: |
            NEXT_PUBLIC_SOCKET_SERVER_URL=${{ steps.env-vars.outputs.socket_url }}
          cache-from: type=gha
